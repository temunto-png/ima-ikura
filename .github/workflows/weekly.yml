name: Weekly Data Update

on:
  schedule:
    # 毎週水曜 15:00 JST = 06:00 UTC
    - cron: '0 6 * * 3'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch weekly data
        run: python scripts/fetch_weekly.py

      - name: Calculate streaks
        run: python scripts/calc_streaks.py

      - name: Generate AI comments
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_comments.py

      - name: Generate OGP images
        run: python scripts/generate_ogp.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ public/ogp/
          git diff --staged --quiet || git commit -m "chore: weekly data update $(date -u +%Y-%m-%d)"
          git push

      - name: Notify on failure
        if: failure()
        run: echo "::error::Weekly update failed. Check logs."
