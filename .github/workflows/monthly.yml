name: Monthly Data Update

on:
  schedule:
    # 毎月25日 09:00 JST = 00:00 UTC
    - cron: '0 0 25 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch monthly data
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}
        run: python scripts/fetch_monthly.py

      - name: Calculate streaks (月次指標含む)
        run: python scripts/calc_streaks.py --include-monthly

      - name: Calculate cumulative counter
        run: python scripts/calc_cumulative.py

      - name: Generate AI comments
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_comments.py

      - name: Generate OGP images
        run: python scripts/generate_ogp.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ public/ogp/
          git diff --staged --quiet || git commit -m "chore: monthly data update $(date -u +%Y-%m-%d)"
          git push

      - name: Trigger Cloudflare Pages deployment
        if: env.CF_DEPLOY_HOOK != ''
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$CF_DEPLOY_HOOK")
          if [ "$STATUS" != "200" ]; then
            echo "::error::CF Pages deploy hook failed (HTTP $STATUS)"
            exit 1
          fi
          echo "::notice::Cloudflare Pages deployment triggered."
